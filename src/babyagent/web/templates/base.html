<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BabyAgent 管理控制台{% endblock %}</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; color: #1e293b; background: #f1f5f9; }

        /* ===== Layout ===== */
        .app-layout { display: flex; height: 100vh; }
        .sidebar { width: 220px; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid #1e293b; }
        .sidebar-header h1 { font-size: 16px; font-weight: 700; color: #f8fafc; }
        .sidebar-header .subtitle { font-size: 11px; color: #64748b; margin-top: 2px; }
        .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
        .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: #94a3b8; text-decoration: none; font-size: 13px; transition: all 0.15s; border-left: 3px solid transparent; }
        .sidebar-nav a:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }
        .sidebar-nav a.active { color: #f8fafc; background: rgba(59,130,246,0.15); border-left-color: #3b82f6; font-weight: 600; }
        .sidebar-nav .nav-icon { font-size: 16px; width: 20px; text-align: center; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #1e293b; font-size: 11px; color: #475569; }

        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 0 24px; height: 52px; background: #ffffff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
        .topbar .page-title { font-size: 15px; font-weight: 600; color: #0f172a; }
        .topbar .user-area { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .topbar .logout-btn { color: #ef4444; text-decoration: none; font-size: 12px; padding: 4px 10px; border: 1px solid #fecaca; border-radius: 4px; transition: all 0.15s; }
        .topbar .logout-btn:hover { background: #fef2f2; }
        .content { flex: 1; overflow-y: auto; padding: 20px 24px; }

        /* ===== Common Components ===== */
        .card { background: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 16px; }
        .card-header { font-size: 15px; font-weight: 600; color: #0f172a; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; }
        .card-header .card-desc { font-size: 12px; font-weight: 400; color: #94a3b8; margin-top: 2px; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 16px 20px; }
        .stat-card .stat-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; color: #0f172a; }
        .stat-card .stat-desc { font-size: 11px; color: #94a3b8; margin-top: 4px; }

        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 4px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; font-size: 13px; border: 1px solid #cbd5e1; border-radius: 6px; background: #ffffff; color: #1e293b; transition: border-color 0.15s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-select { cursor: pointer; }

        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: 6px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; text-decoration: none; }
        .btn-primary { background: #3b82f6; color: #ffffff; border-color: #3b82f6; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #f1f5f9; color: #334155; border-color: #cbd5e1; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger { background: #ef4444; color: #ffffff; border-color: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-green { background: #22c55e; color: #ffffff; border-color: #22c55e; }
        .btn-green:hover { background: #16a34a; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* ===== Table ===== */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th, table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        table th { font-weight: 600; color: #64748b; font-size: 12px; text-transform: uppercase; background: #f8fafc; white-space: nowrap; }
        table tr:hover td { background: #f8fafc; }
        table a { color: #3b82f6; text-decoration: none; }
        table a:hover { text-decoration: underline; }

        /* ===== Status Badges ===== */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-gray { background: #f1f5f9; color: #475569; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }

        /* ===== Misc ===== */
        .flex-row { display: flex; align-items: center; gap: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mb-12 { margin-bottom: 12px; }
        .mb-16 { margin-bottom: 16px; }
        .mb-20 { margin-bottom: 20px; }
        .mt-8 { margin-top: 8px; }
        .text-sm { font-size: 12px; }
        .text-muted { color: #64748b; }
        .text-center { text-align: center; }
        .text-success { color: #16a34a; }
        .text-danger { color: #dc2626; }
        .msg-success { background: #dcfce7; color: #166534; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
        .msg-error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
        .empty-state { text-align: center; padding: 48px 20px; color: #94a3b8; }
        .empty-state .empty-icon { font-size: 36px; margin-bottom: 8px; }
        .search-bar { display: flex; gap: 8px; }
        .search-bar .form-input { max-width: 300px; }
        .inline-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .inline-form .form-group { margin-bottom: 0; }
        .code-block { font-family: "Consolas", "Courier New", monospace; font-size: 12px; background: #1e293b; color: #e2e8f0; padding: 12px 16px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>BabyAgent</h1>
                <div class="subtitle">管理控制台 v2.0</div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="{% if current_page == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">&#9632;</span> 仪表盘
                </a>
                <a href="/weixin" class="{% if current_page == 'weixin' %}active{% endif %}">
                    <span class="nav-icon">&#9993;</span> 微信绑定
                </a>
                <a href="/models" class="{% if current_page == 'models' %}active{% endif %}">
                    <span class="nav-icon">&#9733;</span> 模型配置
                </a>
                <a href="/employees" class="{% if current_page == 'employees' %}active{% endif %}">
                    <span class="nav-icon">&#9786;</span> 员工管理
                </a>
                <a href="/babies" class="{% if current_page == 'babies' %}active{% endif %}">
                    <span class="nav-icon">&#9829;</span> 宝宝档案
                </a>
                <a href="/products" class="{% if current_page == 'products' %}active{% endif %}">
                    <span class="nav-icon">&#9790;</span> 产品管理
                </a>
                <a href="/settings" class="{% if current_page == 'settings' %}active{% endif %}">
                    <span class="nav-icon">&#9881;</span> 系统设置
                </a>
            </nav>
            <div class="sidebar-footer">&copy; 2026 BabyAgent</div>
        </aside>

        <!-- Main Content -->
        <div class="main-area">
            <header class="topbar">
                <span class="page-title">{% block page_title %}仪表盘{% endblock %}</span>
                <div class="user-area">
                    <span class="text-sm text-muted">管理员</span>
                    <a href="/logout" class="logout-btn">退出登录</a>
                </div>
            </header>
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
