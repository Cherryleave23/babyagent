<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - BabyAgent 管理控制台</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #ffffff; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-box h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 4px; text-align: center; }
        .login-box .subtitle { font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 6px; transition: border-color 0.15s; }
        .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn-login { width: 100%; padding: 10px; font-size: 15px; font-weight: 600; color: #ffffff; background: #3b82f6; border: none; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
        .btn-login:hover { background: #2563eb; }
        .error-msg { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
        .footer-note { text-align: center; margin-top: 24px; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>BabyAgent</h1>
        <p class="subtitle">管理控制台登录</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>

        <p class="footer-note">本地管理界面 - 仅供内部运维使用</p>
    </div>
</body>
</html>
